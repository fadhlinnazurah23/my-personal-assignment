<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Checker</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="logo"></div>

            <div class="links">
                <div class="link"><a href="index.html">Home</a></div>
                <div class="link"><a href="tools.html">Tools</a></div>
                <div class="link contact-btn"><a href="tools.html">Back</a></div>
        </div>
    </nav>

    <section>
        <div class="main-container">

            <div class="content">
                <h1>BMI <span>Checker</span></h1>

                <p>Enter your height and weight:</p>

                <input type="number" id="weight" placeholder="Weight (kg)">
                <br><br>
                <input type="number" id="height" placeholder="Height (cm)">
                <br><br>

                <div class="btn">
                    <button onclick="calculateBMI()">Check BMI</button>
                </div>

                <p><b>Your BMI:</b> <span id="bmiResult"></span></p>
                <p><b>Status:</b> <span id="bmiStatus"></span></p>

            </div>
        </div>
    </section>

    <script src="script.js"></script>

</body>
</html>
