<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="logo"></div>

            <div class="links">
                <div class="link"><a href="index.html">Home</a></div>
                <div class="link"><a href="tools.html">Tools</a></div>
                <div class="link contact-btn"><a href="tools.html">Back</a></div>
        </div>
    </nav>

    <section>
        <div class="main-container">

            <div class="content">
                <h1>Unit <span>Converter</span></h1>

                <p>Enter value:</p>

                <input type="number" id="unitInput" placeholder="Enter number">
                <br><br>

                <div class="btn">
                    <button onclick="cmToM()">cm to metre</button>
                </div>

                <div class="btn">
                    <button onclick="mToCm()">metre to cm</button>
                </div>

                <div class="btn">
                    <button onclick="mToKm()">metre to km</button>
                </div>

                <div class="btn">
                    <button onclick="kmToM()">km to metre</button>
                </div>

                <p><b>Result:</b> <span id="convertResult"></span></p>

            </div>
        </div>
    </section>

    <script src="script.js"></script>

</body>
</html>
